name: Deploy Inventario API

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-inventario-api.yml"

env:
  ACR_NAME: acrpraiasturdev
  ACR_LOGIN_SERVER: acrpraiasturdev.azurecr.io
  IMAGE_NAME: inventario-backend
  CONTAINER_APP_NAME: inventario-api
  RESOURCE_GROUP: rg-praiastur-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:${{ github.sha }} \
            --image $IMAGE_NAME:latest \
            --file backend/Dockerfile \
            backend

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            --revision-suffix ${{ github.run_number }}

      - name: Smoke Test
        run: |
          sleep 30
          curl --fail https://api.praiastur.com/inventario/health
